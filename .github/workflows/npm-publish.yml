name: Publish to npm

on:
  push:
    branches: [main]
    paths-ignore: ['*.md', 'docs/**', 'LICENSE', '.gitignore']
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        type: choice
        default: patch
        options: [patch, minor, major]

concurrency:
  group: publish
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4
        with:
          version: 9

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Check if version exists on npm
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "name=$PKG_NAME version=$PKG_VER"
          if npm view "${PKG_NAME}@${PKG_VER}" version 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: bump
        if: steps.check.outputs.exists == 'true' && github.actor != 'github-actions[bot]'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BUMP="${{ inputs.bump || 'patch' }}"
          NEXT_VER=$(npm version "$BUMP" --no-git-tag-version | tr -d 'v')
          echo "version=$NEXT_VER" >> "$GITHUB_OUTPUT"

          # Clean up stale tag if it exists (from a previous failed run)
          TAG="v${NEXT_VER}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

          git add package.json
          git commit -m "chore: bump to v${NEXT_VER} [skip ci]"
          git tag -a "$TAG" -m "chore: bump to v${NEXT_VER} [skip ci]"
          git push --follow-tags
          echo "bumped=true" >> "$GITHUB_OUTPUT"

      - name: Rebuild after bump
        if: steps.bump.outputs.bumped == 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.check.outputs.exists == 'false' || steps.bump.outputs.bumped == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks
